<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Widgets Site — ocufuzz</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    button { margin: 0.25rem 0.5rem 0.25rem 0; padding: 0.5rem 0.75rem; cursor: pointer; }
    #panel { margin-top: 1rem; padding: 1rem; border: 1px solid #ccc; border-radius: 8px; min-height: 4rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Widgets site</h1>
  <p>Client-side state: counter and toggle panel.</p>
  <p>Count: <strong id="c">0</strong></p>
  <button type="button" id="inc">Increment</button>
  <button type="button" id="dec">Decrement</button>
  <button type="button" id="toggle">Toggle panel</button>
  <div id="panel" class="hidden">Secret panel is visible. <span id="rand"></span></div>
  <p><a href="../forms-site/">← Forms site</a> · <a href="../flow-site/">Flow site →</a></p>
  <script>
    var n = 0;
    var c = document.getElementById("c");
    var panel = document.getElementById("panel");
    document.getElementById("inc").onclick = function () { n++; c.textContent = String(n); };
    document.getElementById("dec").onclick = function () { n--; c.textContent = String(n); };
    document.getElementById("toggle").onclick = function () {
      panel.classList.toggle("hidden");
      document.getElementById("rand").textContent = "id=" + Math.random().toString(36).slice(2, 8);
    };
  </script>
</body>
</html>
