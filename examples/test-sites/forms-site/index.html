<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forms Site — ocufuzz</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 0.75rem; }
    input { width: 100%; padding: 0.4rem; margin-top: 0.25rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    #msg { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; display: none; }
    #msg.ok { display: block; background: #e8f5e9; color: #1b5e20; }
    #msg.err { display: block; background: #ffebee; color: #b71c1c; }
  </style>
</head>
<body>
  <h1>Forms site</h1>
  <p>Required fields and simple validation for exploration traces.</p>
  <form id="f">
    <label>Email <input type="email" name="email" id="email" autocomplete="username" /></label>
    <label>Password <input type="password" name="pw" id="pw" autocomplete="current-password" /></label>
    <label>Notes <input type="text" name="notes" id="notes" /></label>
    <button type="submit">Sign in</button>
  </form>
  <div id="msg"></div>
  <p><a href="../widgets-site/">Widgets site →</a></p>
  <script>
    document.getElementById("f").addEventListener("submit", function (e) {
      e.preventDefault();
      var email = document.getElementById("email").value.trim();
      var pw = document.getElementById("pw").value;
      var msg = document.getElementById("msg");
      msg.className = "";
      msg.style.display = "none";
      if (!email || !pw) {
        msg.textContent = "Error: email and password are required.";
        msg.className = "err";
        return;
      }
      msg.textContent = "OK: submitted for " + email + ".";
      msg.className = "ok";
    });
  </script>
</body>
</html>
