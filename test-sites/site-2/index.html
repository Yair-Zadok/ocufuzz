<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harbor Booking</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "Segoe UI", sans-serif; }
    body { margin: 0; background: linear-gradient(160deg, #eef4ff, #f7fbff); color: #1d2a3a; }
    main { width: min(840px, calc(100% - 2rem)); margin: 2rem auto; }
    .card { background: #fff; border: 1px solid #d8e2f1; border-radius: 16px; padding: 1.25rem; box-shadow: 0 14px 45px rgba(20, 45, 89, 0.08); }
    h1 { margin: 0 0 0.5rem; font-size: clamp(2rem, 5vw, 3rem); }
    p { color: #4e5f73; }
    form { display: grid; gap: 0.9rem; margin-top: 1rem; }
    label { display: grid; gap: 0.35rem; font-weight: 700; }
    input, select, button { font: inherit; }
    input, select { padding: 0.7rem 0.8rem; border: 1px solid #c8d5e8; border-radius: 10px; }
    button { border: 0; border-radius: 999px; background: #3366ff; color: #fff; font-weight: 700; padding: 0.7rem 1rem; cursor: pointer; }
    .status { margin-top: 1rem; padding: 0.75rem; border-radius: 10px; display: none; }
    .status.show { display: block; }
    .ok { background: #e8f7ee; color: #106338; }
    .bad { background: #feeceb; color: #8e1e17; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Harbor Booking</h1>
      <p>Reserve a table in minutes with flexible times and instant confirmation.</p>
      <form id="bookingForm">
        <label>
          Full name
          <input id="name" type="text" placeholder="Taylor Reed" />
        </label>
        <label>
          Email
          <input id="email" type="email" placeholder="you@example.com" />
        </label>
        <label>
          Party size
          <select id="party">
            <option value="">Choose a party size</option>
            <option>2 guests</option>
            <option>4 guests</option>
            <option>6 guests</option>
          </select>
        </label>
        <label>
          Date
          <input id="date" type="date" />
        </label>
        <label>
          Time
          <select id="time">
            <option value="">Choose a time</option>
            <option>18:00</option>
            <option>19:00</option>
            <option>20:00</option>
          </select>
        </label>
        <button type="submit">Confirm reservation</button>
      </form>
      <div id="status" class="status" role="status"></div>
    </section>
  </main>

  <script>
    var statusEl = document.getElementById("status");
    document.getElementById("bookingForm").addEventListener("submit", function (event) {
      event.preventDefault();
      var name = document.getElementById("name").value.trim();
      var email = document.getElementById("email").value.trim();
      var party = document.getElementById("party").value;
      var date = document.getElementById("date").value;
      var time = document.getElementById("time").value;

      if (!email || !date) {
        statusEl.className = "status bad show";
        statusEl.textContent = "Please provide at least an email and date.";
        return;
      }

      statusEl.className = "status ok show";
      statusEl.textContent = "Booked for " + name + " (" + party + ") at " + time + " on " + date + ".";
    });
  </script>
</body>
</html>
